title: Infoblox - App Migration NIOS-X-as-a-Service - Pre-provisioned
description: "\U0001F9ED Introduction\n\nYou’re working with CloudOps and NetOps teams
  to migrate a legacy app from the data center into AWS. In this hands-on lab, you’ll
  simulate a real-world migration using Infoblox Universal DDI for IP automation and
  NIOS-X-as-a-Service (SaaS) for authoritative DNS and DNS Traffic Control (DTC) to
  enable smart, policy-driven traffic steering.\n\nYou’ll:\n- Start with a running
  on-premises application.\n- Deploy a cloud copy in AWS using Terraform + Universal
  DDI for automated IP assignment.\n- Use Infoblox DTC via NIOS-X-as-a-Service to
  gradually shift users from on-prem to cloud.\n\nThis lab combines SaaS-delivered
  DNS services, infrastructure automation, IPAM integration, and DNS-level traffic
  control to modernize your application footprint with minimal disruption.\n\n\U0001F3AF
  Lab Objectives\n- Deploy an AWS-based copy of an on-prem app using Terraform and
  Infoblox Universal DDI\n- Leverage DTC via NIOS-X-as-a-Service to manage and shift
  traffic across environments\n- Simulate a safe, controlled application migration
  using DNS-based traffic steering"
